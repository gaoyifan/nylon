key: 0NcrMcaS1tORCTA88L5ZPE+H6yUMV4e5vRp6iypnPW8=
id: alice
port: 57175 # Required local data port; 57175 is conventional; fake-TCP emits TCP-shaped packets on it

# the following are optional
use_system_routing: false # Default: false - all packets from peers will come out of the TUN interface
no_net_configure: false # Skip normal route/address setup; tcp_obfuscation still attaches TCX
log_path: "" # Default: "" - If set, Nylon will log to this file
interface_name: "" # Default: "" - If set, Nylon will use this interface name instead of the default "nylon" or utunx on macOS
mtu: 0 # Default: 0 (= 1406) - MTU of the nylon interface. Keep it consistent across the mesh; remember multi-hop paths pay the MPLS label overhead on top
dns_resolvers: [] # Default: [] - If set (e.g ["1.1.1.1:53"]), nylon will use these DNS resolvers for its own queries
# If central.yaml enables tcp_obfuscation for this router, it requires
# non-Android Linux 6.6+ on amd64/arm64 and a named-interface bind here.
# UDP remains available; source-only binds and LAN-discovered candidates remain UDP-only.
# binds:
#   - interface: eth0
# Optional Linux-only signed IPv4 subnet-broadcast discovery for graph neighbours on the same LAN.
# Uses link-scoped UDP 57176 only for announcements; WireGuard traffic stays on `port`.
# lan_discovery:
#   - eth0
dist: # Optional: If set, Nylon will bootstrap central.yaml from this URL if it does not exist already
  url: https://static.example.com/network1.nybundle
  key: 7PaN6DmAayz4KnDnsXSXJH+Oy0TFGeoM4FEbQfLriVY=
unexclude_ips: [] # split tunnel, subtracts from centrally excluded ip ranges
exclude_ips: # split tunnel, adds to the centrally excluded ip ranges
  - 192.168.0.0/24 # e.g here, we exclude the local ip range

# exit-node feature (a node may be an exit, a client of an exit, both, or neither)
advertise_exit_node: false # Default: false - accept and terminate exit traffic on this node
exit_node: "" # Default: "" - route otherwise-unrouted traffic through this remote node id
exit_node_default_route: false # Default: false - when used with exit_node, install 0.0.0.0/0 (full tunnel). If false, only destinations explicitly routed onto nylon are tunneled

# Default: 0s - make this node less attractive for forwarding (transit) traffic.
# Adds this latency-equivalent cost to every route learned from neighbours, so
# other nodes prefer alternative paths unless they are worse by more than this
# amount. The node's own prefixes are unaffected (it stays a normal leaf node).
# Useful for low-bandwidth nodes, e.g. transit_cost: 250ms
transit_cost: 0s

# Signed local preference for fake TCP. This applies to outbound endpoint
# selection and once to the resulting link/route metric. For example, -5ms
# lets fake TCP win when it is no more than 5ms slower than UDP.
tcp_cost: 0s

# Per-flow exit selection via MPLS (optional, no config needed): a node's binary
# id is also its MPLS label, so you can steer any traffic out through any
# exit-advertising node just by routing it into nylon with an MPLS-encap route,
# e.g. to send fwmark 0x1 traffic out through the node with binary id 5:
#   ip rule add fwmark 0x1 lookup 101
#   ip route add default dev nylon0 encap mpls 5 table 101
# Switch exits at runtime by re-pointing that route's label; no nylon restart.

# for even more flexibility, you may execute commands when the interface starts or stops
pre_up: []
pre_down: []
post_up:
  - iptables -t nat -A POSTROUTING -s 10.0.0.0/24 -d 192.168.0.0/24 -j MASQUERADE # can be used in conjunction with an advertised prefix
post_down: []
